<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Tienda del Gatito — Dahia App</title>
<style>
  :root{
    --pink-1:#ffe6f1; --pink-2:#ffd0e6; --pink-5:#ff7fb3;
    --cat:#ffc7e0; --cat-shade:#ffb0d4; --ear:#ff9ec7; --ear-in:#ff7fb3;
    --ink:#5b4350; --blush:#ff7aa8; --gold:#ffc24b; --green:#56c596;
    --glass:rgba(255,255,255,.55);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:radial-gradient(120% 100% at 50% 0%, var(--pink-1) 0%, var(--pink-2) 45%, #fbe3ff 100%);
    min-height:100dvh;color:var(--ink);padding:18px 16px 36px;display:flex;flex-direction:column;
    align-items:center;gap:16px}
  .top{width:100%;max-width:380px;display:flex;justify-content:space-between;align-items:center}
  .top h1{font-size:17px;margin:0;font-weight:800}
  .coins{display:flex;align-items:center;gap:6px;background:#fff;border-radius:999px;
    padding:7px 14px;font-weight:800;box-shadow:0 8px 18px -8px rgba(255,160,40,.6)}
  .coins b{color:#e89a18}

  .daily{width:100%;max-width:380px;display:flex;gap:10px;align-items:center;
    background:var(--glass);border:1px solid rgba(255,255,255,.7);border-radius:20px;
    padding:12px 14px;backdrop-filter:blur(12px);box-shadow:0 12px 26px -16px rgba(255,90,160,.5)}
  .daily .flame{font-size:24px}
  .daily .d-txt{flex:1;font-size:13px}
  .daily .d-txt b{font-size:15px}
  .daily button{border:0;border-radius:14px;padding:11px 14px;font-weight:800;color:#fff;
    background:linear-gradient(135deg,var(--gold),#ff9ec7);cursor:pointer;font-size:14px;white-space:nowrap}
  .daily button:disabled{filter:grayscale(.5);opacity:.6}

  .stage{position:relative;width:240px;height:230px;display:flex;align-items:center;justify-content:center}
  .cat-wrap{width:190px;animation:float 3.6s ease-in-out infinite}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  #eyesOpen{transform-origin:center 118px;animation:blink 4.6s infinite}
  @keyframes blink{0%,92%,100%{transform:scaleY(1)}96%{transform:scaleY(.08)}}
  #tail{transform-origin:170px 175px;animation:tail 2.8s ease-in-out infinite}
  @keyframes tail{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(10deg)}}
  .acc{display:none}
  .pop{animation:pop .4s cubic-bezier(.2,1.5,.4,1)}
  @keyframes pop{0%{transform:scale(0)}100%{transform:scale(1)}}

  .toast{position:fixed;top:14px;left:50%;transform:translateX(-50%) translateY(-80px);
    background:var(--ink);color:#fff;padding:10px 18px;border-radius:999px;font-weight:700;
    font-size:13px;transition:transform .3s cubic-bezier(.2,1.4,.4,1);z-index:9}
  .toast.show{transform:translateX(-50%) translateY(0)}

  .shop-title{width:100%;max-width:380px;font-weight:800;font-size:14px;opacity:.75;margin-top:2px}
  .shop{width:100%;max-width:380px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .item{background:var(--glass);border:1px solid rgba(255,255,255,.7);border-radius:18px;
    padding:12px 6px 10px;text-align:center;backdrop-filter:blur(10px);cursor:pointer;
    transition:transform .12s ease, box-shadow .2s ease;box-shadow:0 8px 18px -12px rgba(255,90,160,.5)}
  .item:active{transform:scale(.95)}
  .item.equipped{outline:2.5px solid var(--green);box-shadow:0 8px 20px -8px rgba(86,197,150,.6)}
  .item .ico{font-size:30px;line-height:1.1}
  .item .nm{font-size:11px;font-weight:700;margin-top:3px}
  .item .pr{font-size:11px;font-weight:800;margin-top:5px;color:#e89a18}
  .item.owned .pr{color:var(--green)}
  .hint{max-width:380px;font-size:11.5px;opacity:.6;text-align:center;margin-top:4px}
</style>
</head>
<body>
  <div class="toast" id="toast"></div>

  <div class="top">
    <h1>🛍️ Clóset de Michi</h1>
    <div class="coins">🪙 <b id="coinN">50</b></div>
  </div>

  <div class="daily">
    <span class="flame">🔥</span>
    <div class="d-txt">Racha: <b id="streak">0 días</b><br><span style="opacity:.7">Entra cada día y gana monedas</span></div>
    <button id="claimBtn" onclick="claim()">🎁 Entrar hoy</button>
  </div>

  <div class="stage">
    <div class="cat-wrap">
      <svg viewBox="0 0 240 240" width="100%" xmlns="http://www.w3.org/2000/svg">
        <path id="tail" d="M168 178 q44 6 40 -40 q-3 -22 -20 -22 q14 6 12 24 q-2 26 -34 24 z" fill="var(--cat-shade)"/>
        <ellipse cx="120" cy="178" rx="62" ry="48" fill="var(--cat)"/>
        <ellipse cx="120" cy="190" rx="40" ry="30" fill="#fff" opacity=".5"/>
        <ellipse cx="96" cy="214" rx="17" ry="12" fill="var(--cat-shade)"/>
        <ellipse cx="144" cy="214" rx="17" ry="12" fill="var(--cat-shade)"/>
        <!-- scarf (behind head bottom) -->
        <g id="acc-scarf" class="acc">
          <path d="M74 150 q46 30 92 0 l0 16 q-46 30 -92 0 Z" fill="var(--green)"/>
          <path d="M150 162 l16 4 l-4 22 l-14 -6 z" fill="#3fae82"/>
        </g>
        <path id="earL" d="M74 92 L86 50 L116 78 Z" fill="var(--ear)"/>
        <path d="M166 92 L154 50 L124 78 Z" fill="var(--ear)"/>
        <path d="M83 84 L90 62 L106 78 Z" fill="var(--ear-in)"/>
        <path d="M157 84 L150 62 L134 78 Z" fill="var(--ear-in)"/>
        <circle cx="120" cy="112" r="56" fill="var(--cat)"/>
        <ellipse cx="84" cy="124" rx="13" ry="8" fill="var(--blush)" opacity=".55"/>
        <ellipse cx="156" cy="124" rx="13" ry="8" fill="var(--blush)" opacity=".55"/>
        <g id="eyesOpen">
          <ellipse cx="98" cy="112" rx="9" ry="12" fill="var(--ink)"/>
          <ellipse cx="142" cy="112" rx="9" ry="12" fill="var(--ink)"/>
          <circle cx="101" cy="108" r="3" fill="#fff"/><circle cx="145" cy="108" r="3" fill="#fff"/>
        </g>
        <path d="M116 126 h8 l-4 5 z" fill="var(--ear-in)"/>
        <path d="M120 131 q-7 8 -14 2 M120 131 q7 8 14 2" fill="none" stroke="var(--ink)" stroke-width="2.6" stroke-linecap="round"/>
        <g stroke="var(--ink)" stroke-width="1.6" stroke-linecap="round" opacity=".5">
          <line x1="64" y1="120" x2="84" y2="122"/><line x1="64" y1="130" x2="84" y2="129"/>
          <line x1="176" y1="120" x2="156" y2="122"/><line x1="176" y1="130" x2="156" y2="129"/>
        </g>
        <!-- glasses -->
        <g id="acc-glasses" class="acc">
          <circle cx="98" cy="112" r="16" fill="rgba(255,255,255,.25)" stroke="var(--ink)" stroke-width="3"/>
          <circle cx="142" cy="112" r="16" fill="rgba(255,255,255,.25)" stroke="var(--ink)" stroke-width="3"/>
          <line x1="114" y1="110" x2="126" y2="110" stroke="var(--ink)" stroke-width="3"/>
        </g>
        <!-- bow on left ear -->
        <g id="acc-bow" class="acc">
          <path d="M90 56 q-18 -12 -18 4 q0 14 18 6 z" fill="var(--pink-5)"/>
          <path d="M90 56 q18 -12 18 4 q0 14 -18 6 z" fill="var(--pink-5)"/>
          <circle cx="90" cy="62" r="6" fill="#ff5fa0"/>
        </g>
        <!-- flower on right ear -->
        <g id="acc-flower" class="acc">
          <g transform="translate(150,56)" fill="#ff8fc4">
            <circle cx="0" cy="-7" r="6"/><circle cx="7" cy="-2" r="6"/><circle cx="4" cy="6" r="6"/>
            <circle cx="-4" cy="6" r="6"/><circle cx="-7" cy="-2" r="6"/>
            <circle cx="0" cy="0" r="4.5" fill="var(--gold)"/>
          </g>
        </g>
        <!-- party hat -->
        <g id="acc-hat" class="acc">
          <path d="M120 22 L100 64 L140 64 Z" fill="var(--pink-5)"/>
          <path d="M120 22 L110 64 L120 64 Z" fill="#ff5fa0" opacity=".5"/>
          <circle cx="120" cy="20" r="6" fill="var(--gold)"/>
        </g>
        <!-- crown -->
        <g id="acc-crown" class="acc">
          <path d="M92 60 L100 40 L112 56 L120 36 L128 56 L140 40 L148 60 Z" fill="var(--gold)" stroke="#e89a18" stroke-width="1.5"/>
          <circle cx="120" cy="50" r="3" fill="#ff5fa0"/>
        </g>
      </svg>
    </div>
  </div>

  <div class="shop-title">✨ Tienda — tócalos para comprar y poner/quitar</div>
  <div class="shop" id="shop"></div>
  <p class="hint">Esto es solo una <b>muestra</b> de la idea: monedas por entrar cada día + tienda para vestir al gato. La ropa son capas de dibujo sobre el gato vectorial, por eso se ve consistente. 🐱</p>

<script>
  const items=[
    {id:'bow',ico:'🎀',nm:'Moño',price:20},
    {id:'flower',ico:'🌸',nm:'Flor',price:20},
    {id:'glasses',ico:'👓',nm:'Gafas',price:35},
    {id:'scarf',ico:'🧣',nm:'Bufanda',price:40},
    {id:'hat',ico:'🎉',nm:'Gorrito',price:55},
    {id:'crown',ico:'👑',nm:'Corona',price:90},
  ];
  let coins=50, streak=0, claimed=false;
  const owned=new Set(), equipped=new Set();
  const $=id=>document.getElementById(id);

  function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');
    clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1600);}

  function claim(){
    streak++;
    const reward=10+streak*5;
    coins+=reward;
    $('streak').textContent=streak+(streak===1?' día':' días');
    $('coinN').textContent=coins;
    toast('🎁 +'+reward+' 🪙  ¡racha de '+streak+'!');
    // demo: let her keep claiming to feel the streak grow
  }

  function render(){
    const shop=$('shop');shop.innerHTML='';
    items.forEach(it=>{
      const has=owned.has(it.id), eq=equipped.has(it.id);
      const d=document.createElement('div');
      d.className='item'+(has?' owned':'')+(eq?' equipped':'');
      d.innerHTML=`<div class="ico">${it.ico}</div><div class="nm">${it.nm}</div>
        <div class="pr">${has?(eq?'✓ puesto':'guardado'):'🪙 '+it.price}</div>`;
      d.onclick=()=>tap(it);
      shop.appendChild(d);
    });
    $('coinN').textContent=coins;
  }

  function tap(it){
    if(!owned.has(it.id)){
      if(coins<it.price){toast('Te faltan monedas 🥲');return;}
      coins-=it.price;owned.add(it.id);equip(it.id,true);
      toast('¡Compraste '+it.nm+'! 🎉');
    } else {
      const on=!equipped.has(it.id);
      equip(it.id,on);
      toast(on?it.nm+' puesto ✨':it.nm+' guardado');
    }
    render();
  }

  function equip(id,on){
    const el=$('acc-'+id);
    if(on){equipped.add(id);el.style.display='block';el.classList.remove('pop');void el.offsetWidth;el.classList.add('pop');}
    else{equipped.delete(id);el.style.display='none';}
  }

  render();
</script>
</body>
</html>
